<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Murid — Jaguh Sifir</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F3F0FF; --ink:#2B2358; --muted:#7A72A8;
  --primary:#6C4DF4; --primary-dark:#5438D6;
  --ok:#22C55E; --ok-dark:#16A34A; --bad:#EF4444;
  --card:#FFFFFF; --line:#E4DFFA;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;color:var(--ink);background:var(--bg);
  background-image:radial-gradient(circle at 15% 15%,#E6DEFF 0,transparent 32%),
                   radial-gradient(circle at 85% 85%,#DFF6FF 0,transparent 32%);min-height:100vh}
.wrap{max-width:480px;margin:0 auto;padding:24px 16px 60px}
h1,h2,label.big{font-family:'Baloo 2',cursive}
.logo{text-align:center;margin:16px 0 20px}
.logo h1{font-size:2rem;color:var(--primary)}
.logo p{color:var(--muted);font-weight:700;margin-top:2px}
.card{background:var(--card);border:2px solid var(--line);border-radius:22px;padding:24px;box-shadow:0 6px 0 var(--line)}
.intro{text-align:center;color:var(--muted);font-weight:700;margin-bottom:20px;line-height:1.5}

.field{margin-bottom:18px}
.field label{display:block;font-weight:800;margin-bottom:7px;font-size:.95rem}
.field .hint{font-weight:700;color:var(--muted);font-size:.8rem;margin-top:5px}
.field input,.field select{
  width:100%;padding:14px;border:2px solid var(--line);border-radius:14px;
  font-family:'Nunito';font-weight:700;font-size:1rem;background:#fff;color:var(--ink);
}
.field input:focus,.field select:focus{outline:none;border-color:var(--primary)}
.field input.digit{font-family:'Baloo 2',cursive;font-size:1.5rem;letter-spacing:.3em;text-align:center}
select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236C4DF4' stroke-width='3'><path d='M6 9l6 6 6-6'/></svg>");
  background-repeat:no-repeat;background-position:right 16px center;padding-right:44px;cursor:pointer}

.err{color:var(--bad);font-weight:800;text-align:center;min-height:22px;margin:4px 0 10px}
.btn{width:100%;font-family:'Baloo 2',cursive;font-size:1.15rem;font-weight:700;padding:15px;
  border-radius:16px;border:0;cursor:pointer;background:var(--primary);color:#fff;
  box-shadow:0 5px 0 var(--primary-dark);transition:transform .05s}
.btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--primary-dark)}
.btn:disabled{opacity:.55;cursor:not-allowed}

/* popup */
.overlay{position:fixed;inset:0;background:rgba(43,35,88,.55);display:none;
  align-items:center;justify-content:center;padding:20px;z-index:100}
.overlay.on{display:flex;animation:fade .25s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:24px;padding:30px 24px;max-width:380px;width:100%;
  text-align:center;box-shadow:0 12px 40px rgba(43,35,88,.3);animation:pops .35s ease}
@keyframes pops{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.modal.err-modal .emo{color:var(--bad)}
.modal .emo{font-size:3.4rem;line-height:1}
.modal h2{font-size:1.5rem;margin:12px 0 6px}
.modal p{color:var(--muted);font-weight:700;line-height:1.5;margin-bottom:8px}
.modal .kid{font-family:'Baloo 2',cursive;font-size:1.8rem;letter-spacing:.25em;color:var(--primary);
  background:#F3F0FF;border-radius:12px;padding:10px;margin:12px 0}
.modal .btn{margin-top:14px}
.modal .btn.ghost{background:#fff;color:var(--primary);box-shadow:0 5px 0 var(--line);border:2px solid var(--line)}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

.spin{width:20px;height:20px;border:3px solid rgba(255,255,255,.4);border-top-color:#fff;
  border-radius:50%;display:inline-block;vertical-align:middle;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <h1>📝 Daftar Murid</h1>
    <p>Jaguh Sifir</p>
  </div>

  <div class="card">
    <p class="intro">Ibu bapa, sila daftarkan anak anda untuk mula berlatih sifir. Selepas daftar, anak boleh terus log masuk.</p>

    <div class="field">
      <label>Pilih Kelas</label>
      <select id="kelas">
        <option value="">— Sila pilih —</option>
      </select>
    </div>

    <div class="field">
      <label>Nama Penuh Murid</label>
      <input type="text" id="nama" placeholder="Contoh: AHMAD BIN ALI" autocomplete="off">
    </div>

    <div class="field">
      <label>6 Digit Terakhir No. MyKid</label>
      <input type="tel" id="id" class="digit" placeholder="••••••" maxlength="6" inputmode="numeric" autocomplete="off">
      <div class="hint">Angka ini akan jadi kata laluan login anak anda. Sila pastikan betul.</div>
    </div>

    <div class="err" id="err"></div>
    <button class="btn" id="btn" onclick="daftar()">Daftar Sekarang</button>
  </div>
</div>

<!-- POPUP BERJAYA -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="emo" id="mEmo">🎉</div>
    <h2 id="mTitle">Berjaya Didaftarkan!</h2>
    <p id="mMsg"></p>
    <div class="kid" id="mKid"></div>
    <button class="btn" id="mBtn" onclick="pergiKuiz()">Pergi ke Halaman Kuiz →</button>
    <button class="btn ghost" id="mLagi" onclick="tutup()" style="display:none">Cuba Lagi</button>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxCdbHQghBzmHlcctShkE6WPnnVrC2GDv1WLTjur5PlNmgYe5d7KLPiuDKiBv57oeI/exec";
const URL_KUIZ = "../kuiz/";   // laluan ke halaman kuiz

// Hanya benarkan angka dalam kotak ID
document.getElementById('id').addEventListener('input',e=>{
  e.target.value = e.target.value.replace(/\D/g,'').slice(0,6);
});

// Muat senarai kelas dari server (auto ikut Apps Script)
fetch(API_URL + "?action=kelas").then(r=>r.json()).then(res=>{
  if(res.ok && res.kelas){
    const sel = document.getElementById('kelas');
    res.kelas.forEach(k=>{
      const o = document.createElement('option');
      o.value = k; o.textContent = k;
      sel.appendChild(o);
    });
  }
}).catch(()=>{});

let idSimpan = "";
function daftar(){
  const kelas = document.getElementById('kelas').value;
  const nama  = document.getElementById('nama').value.trim();
  const id    = document.getElementById('id').value.trim();
  const err   = document.getElementById('err');
  err.textContent = "";

  if(!kelas){ err.textContent="Sila pilih kelas anak anda."; return; }
  if(nama.length<2){ err.textContent="Sila masukkan nama penuh murid."; return; }
  if(!/^\d{6}$/.test(id)){ err.textContent="6 digit MyKid mesti tepat 6 angka."; return; }

  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Mendaftar...';

  const qs = new URLSearchParams({action:"daftar", kelas, nama, id}).toString();
  fetch(API_URL + "?" + qs).then(r=>r.json()).then(res=>{
    btn.disabled = false;
    btn.textContent = "Daftar Sekarang";
    if(res.ok){
      idSimpan = id;
      tunjukBerjaya(res.nama, res.kelas, id);
    } else {
      tunjukGagal(res.msg || "Pendaftaran gagal.");
    }
  }).catch(()=>{
    btn.disabled = false;
    btn.textContent = "Daftar Sekarang";
    tunjukGagal("Masalah sambungan. Sila cuba lagi.");
  });
}

function tunjukBerjaya(nama, kelas, id){
  const m = document.getElementById('modal');
  m.classList.remove('err-modal');
  document.getElementById('mEmo').textContent = "🎉";
  document.getElementById('mTitle').textContent = "Berjaya Didaftarkan!";
  document.getElementById('mMsg').innerHTML =
    `<b>${esc(nama)}</b> telah didaftarkan dalam kelas <b>${esc(kelas)}</b>.<br>Gunakan 6 digit ini untuk log masuk:`;
  document.getElementById('mKid').textContent = id;
  document.getElementById('mKid').style.display = "block";
  document.getElementById('mBtn').style.display = "block";
  document.getElementById('mLagi').style.display = "none";
  document.getElementById('overlay').classList.add('on');
}
function tunjukGagal(msg){
  const m = document.getElementById('modal');
  m.classList.add('err-modal');
  document.getElementById('mEmo').textContent = "⚠️";
  document.getElementById('mTitle').textContent = "Tidak Berjaya";
  document.getElementById('mMsg').textContent = msg;
  document.getElementById('mKid').style.display = "none";
  document.getElementById('mBtn').style.display = "none";
  document.getElementById('mLagi').style.display = "block";
  document.getElementById('overlay').classList.add('on');
}
function tutup(){ document.getElementById('overlay').classList.remove('on'); }
function pergiKuiz(){ window.location.href = URL_KUIZ; }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
</script>
</body>
</html>
