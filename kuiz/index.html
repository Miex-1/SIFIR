<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jaguh Sifir</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F3F0FF; --ink:#2B2358; --muted:#7A72A8;
  --primary:#6C4DF4; --primary-dark:#5438D6;
  --gold:#F5B301; --gold-deep:#D99700;
  --diamond:#38D6E8; --diamond-deep:#0FA8C4;
  --ok:#22C55E; --bad:#EF4444;
  --card:#FFFFFF; --line:#E4DFFA;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Nunito',sans-serif;color:var(--ink);
  background:var(--bg);
  background-image:radial-gradient(circle at 15% 20%, #E6DEFF 0, transparent 30%),
                   radial-gradient(circle at 85% 80%, #DFF6FF 0, transparent 30%);
  min-height:100%;
}
.wrap{max-width:560px;margin:0 auto;padding:20px 16px 48px}
.screen{display:none}
.screen.active{display:block;animation:pop .35s ease}
@keyframes pop{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

h1,h2,.badge-name,.q-text,.rank-title{font-family:'Baloo 2',cursive}
.logo{text-align:center;margin:16px 0 8px}
.logo h1{font-size:2.2rem;font-weight:800;color:var(--primary);letter-spacing:.5px}
.logo p{color:var(--muted);font-weight:700;margin-top:2px}

.card{background:var(--card);border:2px solid var(--line);border-radius:22px;padding:22px;box-shadow:0 6px 0 var(--line)}

/* ---------- LOGIN ---------- */
.login-label{font-weight:800;margin-bottom:10px;display:block;text-align:center}
.id-box{
  font-family:'Baloo 2',cursive;font-size:2rem;letter-spacing:.35em;text-align:center;
  background:#F8F6FF;border:2px dashed var(--primary);border-radius:14px;
  padding:14px 8px;min-height:70px;color:var(--ink);margin-bottom:14px;
}
.id-box.empty{color:#C6BEEB}
.err{color:var(--bad);font-weight:800;text-align:center;min-height:22px;margin-bottom:6px}

/* ---------- NUMPAD ---------- */
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.numpad button{
  font-family:'Baloo 2',cursive;font-size:1.6rem;font-weight:700;
  padding:14px 0;border-radius:16px;border:2px solid var(--line);
  background:#fff;color:var(--ink);cursor:pointer;
  box-shadow:0 4px 0 var(--line);transition:transform .05s;
}
.numpad button:active{transform:translateY(3px);box-shadow:0 1px 0 var(--line)}
.numpad .pad-del{background:#FFF1F1;border-color:#FBD5D5;box-shadow:0 4px 0 #FBD5D5;color:var(--bad)}
.numpad .pad-ok{background:var(--primary);border-color:var(--primary-dark);box-shadow:0 4px 0 var(--primary-dark);color:#fff}
.numpad .pad-ok:disabled{opacity:.45;cursor:not-allowed}

/* ---------- BUTTONS ---------- */
.btn{
  display:block;width:100%;text-align:center;font-family:'Baloo 2',cursive;
  font-size:1.15rem;font-weight:700;padding:14px;border-radius:16px;border:0;cursor:pointer;
  background:var(--primary);color:#fff;box-shadow:0 5px 0 var(--primary-dark);transition:transform .05s;
}
.btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--primary-dark)}
.btn.ghost{background:#fff;color:var(--primary);box-shadow:0 5px 0 var(--line);border:2px solid var(--line)}
.btn + .btn{margin-top:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ---------- DASHBOARD ---------- */
.hello{display:flex;justify-content:space-between;align-items:center;margin:6px 2px 16px}
.hello .nama{font-family:'Baloo 2',cursive;font-size:1.35rem;font-weight:800}
.hello .keluar{background:none;border:0;color:var(--muted);font-weight:800;cursor:pointer;font-size:.95rem;text-decoration:underline}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media (min-width:480px){.grid{gap:14px}}
.tile{
  background:var(--card);border:2px solid var(--line);border-radius:18px;
  padding:14px 6px 12px;text-align:center;cursor:pointer;
  box-shadow:0 5px 0 var(--line);transition:transform .05s;position:relative;overflow:hidden;
}
.tile:active{transform:translateY(3px);box-shadow:0 2px 0 var(--line)}
.tile .no{font-family:'Baloo 2',cursive;font-size:1.9rem;font-weight:800;line-height:1.1}
.tile .rk{font-size:.72rem;font-weight:800;letter-spacing:.03em;margin-top:4px;color:var(--muted);text-transform:uppercase}
.tile.r0 .no{color:#B9B2DE}
.tile.r1{border-color:#F2D488;background:linear-gradient(180deg,#FFFBEF,#FFF3D0)}
.tile.r1 .no{color:var(--gold-deep)}
.tile.r1 .rk{color:var(--gold-deep)}
.tile.r2{border-color:#9FE8F2;background:linear-gradient(180deg,#F0FDFF,#D8F8FE)}
.tile.r2 .no{color:var(--diamond-deep)}
.tile.r2 .rk{color:var(--diamond-deep)}
.tile.r2::after{
  content:"";position:absolute;top:0;left:-70%;width:45%;height:100%;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.85),transparent);
  animation:shine 2.8s ease-in-out infinite;
}
@keyframes shine{0%{left:-70%}55%{left:130%}100%{left:130%}}
.tile .ikon{font-size:1.05rem;line-height:1;margin-top:2px;min-height:1.2em}
.legend{display:flex;gap:14px;justify-content:center;margin-top:18px;flex-wrap:wrap;color:var(--muted);font-weight:800;font-size:.82rem}
.legend span{display:flex;align-items:center;gap:5px}

/* ---------- TIER SELECT ---------- */
.tier-head{text-align:center;margin-bottom:14px}
.tier-head h2{font-size:1.6rem}
.tier-head p{color:var(--muted);font-weight:700}
.tier-card{
  display:flex;align-items:center;gap:14px;width:100%;text-align:left;
  background:#fff;border:2px solid var(--line);border-radius:18px;
  padding:16px;margin-bottom:12px;cursor:pointer;box-shadow:0 5px 0 var(--line);
  font-family:'Nunito',sans-serif;transition:transform .05s;
}
.tier-card:active{transform:translateY(3px);box-shadow:0 2px 0 var(--line)}
.tier-card .em{font-size:1.9rem}
.tier-card .t{font-family:'Baloo 2',cursive;font-size:1.15rem;font-weight:700}
.tier-card .d{color:var(--muted);font-weight:700;font-size:.88rem}
.tier-card.locked{opacity:.55;cursor:not-allowed}
.tier-card.done{border-color:#BDEBC9;background:#F2FCF4}

/* ---------- QUIZ ---------- */
.q-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-weight:800}
.q-prog{color:var(--muted)}
.q-timer{font-family:'Baloo 2',cursive;font-size:1.2rem;color:var(--primary)}
.q-timer.danger{color:var(--bad);animation:blink 1s steps(2) infinite}
@keyframes blink{50%{opacity:.35}}
.bar{height:10px;background:#E8E3FB;border-radius:99px;overflow:hidden;margin-bottom:18px}
.bar i{display:block;height:100%;width:0;background:var(--primary);border-radius:99px;transition:width .3s}
.q-card{text-align:center;padding:26px 16px}
.q-text{font-size:3rem;font-weight:800;letter-spacing:.02em}
.q-ans{
  font-family:'Baloo 2',cursive;font-size:2.1rem;font-weight:700;min-height:58px;
  border-bottom:4px solid var(--primary);display:inline-block;min-width:110px;margin-top:6px;color:var(--ink);
}
.q-card.good{animation:goodPulse .4s ease}
.q-card.badq{animation:shake .4s ease}
@keyframes goodPulse{0%{box-shadow:0 6px 0 var(--line)}50%{box-shadow:0 0 0 6px #BBF7D0}100%{box-shadow:0 6px 0 var(--line)}}
@keyframes shake{0%,100%{transform:none}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.fb{min-height:30px;font-weight:800;margin-top:8px;font-size:1.05rem}
.fb.good{color:var(--ok)}.fb.bad{color:var(--bad)}
.quiz-pad{margin-top:16px}

/* ---------- RESULT ---------- */
.result{text-align:center;padding:30px 18px}
.result .big{font-size:4rem;line-height:1}
.result h2{font-size:1.8rem;margin:10px 0 4px}
.result p{color:var(--muted);font-weight:700;margin-bottom:18px}
.rank-badge{
  width:130px;height:130px;border-radius:50%;margin:14px auto;display:flex;align-items:center;justify-content:center;
  font-size:3.4rem;position:relative;overflow:hidden;
}
.rank-badge.gold{background:radial-gradient(circle at 35% 30%,#FFE9A8,#F5B301 60%,#C98A00);box-shadow:0 8px 0 #A87400,0 0 0 6px #FFF3D0}
.rank-badge.dia{background:radial-gradient(circle at 35% 30%,#D8FBFF,#38D6E8 60%,#0B8FA8);box-shadow:0 8px 0 #086F83,0 0 0 6px #DFF9FE}
.rank-badge.dia::after{content:"";position:absolute;top:0;left:-70%;width:50%;height:100%;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.9),transparent);animation:shine 2.2s ease-in-out infinite}
.rank-title{font-size:1.4rem;font-weight:800}
.rank-title.gold{color:var(--gold-deep)}.rank-title.dia{color:var(--diamond-deep)}

/* ---------- CONFETTI ---------- */
.confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:50}
.confetti i{position:absolute;top:-14px;width:10px;height:14px;border-radius:3px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg)}}

.loading{text-align:center;color:var(--muted);font-weight:800;padding:30px 0}
.spin{width:38px;height:38px;border:5px solid var(--line);border-top-color:var(--primary);border-radius:50%;margin:0 auto 12px;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">

  <div class="logo">
    <h1>🏆 Jaguh Sifir</h1>
    <p>Hafal sifir, naik rank!</p>
  </div>

  <!-- LOGIN -->
  <section id="scr-login" class="screen active">
    <div class="card">
      <label class="login-label">Masukkan 6 digit terakhir No. MyKid anda</label>
      <div id="idBox" class="id-box empty">••••••</div>
      <div id="loginErr" class="err"></div>
      <div class="numpad" id="padLogin"></div>
      <p style="text-align:center;margin-top:16px;font-weight:700;color:var(--muted)">
        Belum daftar? <a href="../daftar/" style="color:var(--primary);font-weight:800">Daftar di sini</a>
      </p>
    </div>
  </section>

  <!-- LOADING -->
  <section id="scr-loading" class="screen">
    <div class="card loading"><div class="spin"></div><span id="loadMsg">Sedang semak...</span></div>
  </section>

  <!-- DASHBOARD -->
  <section id="scr-dash" class="screen">
    <div class="hello">
      <div>
        <div>Hai, <span class="nama" id="dashNama"></span> 👋</div>
        <div style="font-weight:800;color:var(--muted);font-size:.85rem" id="dashKelas"></div>
      </div>
      <button class="keluar" onclick="logout()">Keluar</button>
    </div>
    <div class="grid" id="grid"></div>
    <div class="legend">
      <span>⬜ Belum Lulus</span><span>🥇 Pro</span><span>💎 Master</span>
    </div>
  </section>

  <!-- TIER SELECT -->
  <section id="scr-tier" class="screen">
    <div class="tier-head">
      <h2>Sifir <span id="tierSifir"></span></h2>
      <p>Pilih cabaran anda</p>
    </div>
    <div id="tierList"></div>
    <button class="btn ghost" onclick="show('scr-dash')">← Kembali</button>
  </section>

  <!-- QUIZ -->
  <section id="scr-quiz" class="screen">
    <div class="q-top">
      <div class="q-prog" id="qProg">Soalan 1/10</div>
      <div class="q-timer" id="qTimer"></div>
    </div>
    <div class="bar"><i id="qBar"></i></div>
    <div class="card q-card" id="qCard">
      <div class="q-text" id="qText">7 × 8 =</div>
      <div class="q-ans" id="qAns">&nbsp;</div>
      <div class="fb" id="qFb"></div>
    </div>
    <div class="numpad quiz-pad" id="padQuiz"></div>
  </section>

  <!-- RESULT -->
  <section id="scr-result" class="screen">
    <div class="card result">
      <div class="big" id="resEmoji">🎉</div>
      <div id="resBadge"></div>
      <h2 id="resTitle"></h2>
      <p id="resMsg"></p>
      <button class="btn" id="resBtn" onclick="afterResult()">Kembali ke Dashboard</button>
      <button class="btn ghost" id="resRetry" onclick="retryQuiz()" style="display:none">Cuba Lagi 💪</button>
    </div>
  </section>

</div>

<div class="confetti" id="confetti"></div>

<script>
/* ============================================================
   TETAPAN — GANTIKAN URL DI BAWAH DENGAN URL APPS SCRIPT ANDA
   ============================================================ */
const API_URL = "https://script.google.com/macros/s/AKfycbxCdbHQghBzmHlcctShkE6WPnnVrC2GDv1WLTjur5PlNmgYe5d7KLPiuDKiBv57oeI/exec";

/* Berapa jauh sifir dibaca (n×1 hingga n×MAX). Ubah jika perlu. */
const MULTIPLIER_MAX = 12;
const SOALAN = 10;                 // bilangan soalan setiap kuiz
const TIER2_MASA = 180;            // saat (3 minit)

const RANK = [
  {nama:"Belum Lulus", ikon:""},
  {nama:"Pro",    ikon:"🥇", cls:"gold"},
  {nama:"Master", ikon:"💎", cls:"dia"}
];

let murid = null;        // {id, nama, ranks:[9]}
let quiz = null;         // state kuiz semasa
let timerInt = null;

/* ---------- UTIL ---------- */
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function api(params){
  const qs = new URLSearchParams(params).toString();
  return fetch(API_URL + "?" + qs).then(r=>r.json());
}
function buatPad(el, onDigit, onDel, onOk, okLabel){
  el.innerHTML = "";
  const keys = ["1","2","3","4","5","6","7","8","9","DEL","0","OK"];
  keys.forEach(k=>{
    const b = document.createElement('button');
    if(k==="DEL"){ b.textContent="⌫"; b.className="pad-del"; b.onclick=onDel; }
    else if(k==="OK"){ b.textContent=okLabel||"OK"; b.className="pad-ok"; b.onclick=onOk; }
    else { b.textContent=k; b.onclick=()=>onDigit(k); }
    el.appendChild(b);
  });
}

/* ---------- LOGIN ---------- */
let idInput = "";
function paparId(){
  const box = document.getElementById('idBox');
  if(idInput.length===0){ box.textContent="••••••"; box.classList.add('empty'); }
  else { box.textContent = idInput.padEnd(6,"•"); box.classList.remove('empty'); }
}
buatPad(document.getElementById('padLogin'),
  d=>{ if(idInput.length<6){ idInput+=d; paparId(); document.getElementById('loginErr').textContent=""; } },
  ()=>{ idInput=idInput.slice(0,-1); paparId(); },
  ()=>{ cubaLogin(); },
  "Masuk"
);
function cubaLogin(){
  if(idInput.length!==6){ document.getElementById('loginErr').textContent="Sila masukkan 6 digit."; return; }
  if(API_URL.startsWith("GANTIKAN")){ document.getElementById('loginErr').textContent="URL API belum ditetapkan."; return; }
  document.getElementById('loadMsg').textContent="Sedang semak ID anda...";
  show('scr-loading');
  api({action:"login", id:idInput}).then(res=>{
    if(res.ok){
      murid = {id:idInput, nama:res.nama, kelas:res.kelas, ranks:res.ranks};
      paparDash();
    } else {
      show('scr-login');
      document.getElementById('loginErr').textContent = res.msg || "ID tidak dijumpai.";
    }
  }).catch(()=>{
    show('scr-login');
    document.getElementById('loginErr').textContent = "Masalah sambungan. Cuba lagi.";
  });
}
function logout(){ murid=null; idInput=""; paparId(); show('scr-login'); }

/* ---------- DASHBOARD ---------- */
function paparDash(){
  document.getElementById('dashNama').textContent = murid.nama;
  document.getElementById('dashKelas').textContent = murid.kelas ? "Kelas " + murid.kelas : "";
  const g = document.getElementById('grid'); g.innerHTML="";
  for(let s=1;s<=9;s++){
    const r = Math.min(murid.ranks[s-1]||0, 2);   // rank melebihi 2 dipapar sebagai Master
    const t = document.createElement('div');
    t.className = "tile r"+r;
    t.innerHTML = `<div class="no">${s}</div>
                   <div class="ikon">${RANK[r].ikon||"&nbsp;"}</div>
                   <div class="rk">${r===0?"Belum":RANK[r].nama}</div>`;
    t.onclick = ()=>pilihTier(s);
    g.appendChild(t);
  }
  show('scr-dash');
}

/* ---------- TIER SELECT ---------- */
let sifirPilih = 0;
function pilihTier(s){
  sifirPilih = s;
  const r = Math.min(murid.ranks[s-1]||0, 2);
  document.getElementById('tierSifir').textContent = s;
  const list = document.getElementById('tierList'); list.innerHTML="";

  const tiers = [
    {t:1, em:"🥇", nama:"Tier 1 — Pro", d:"10 soalan, tiada had masa. Mesti 10/10!"},
    {t:2, em:"💎", nama:"Tier 2 — Master", d:"10 soalan dalam 3 minit. Mesti 10/10!"}
  ];
  tiers.forEach(x=>{
    const locked = x.t > r+1;
    const done = r >= x.t;
    const b = document.createElement('button');
    b.className = "tier-card" + (locked?" locked":"") + (done?" done":"");
    b.innerHTML = `<div class="em">${locked?"🔒":x.em}</div>
      <div><div class="t">${x.nama} ${done?"✅":""}</div>
      <div class="d">${locked?"Lulus tier sebelum ini dahulu":x.d}</div></div>`;
    if(!locked) b.onclick = ()=>mulaKuiz(x.t);
    list.appendChild(b);
  });
  show('scr-tier');
}

/* ---------- QUIZ ---------- */
function janaSoalan(sifir){
  const pool = [];
  for(let m=1;m<=MULTIPLIER_MAX;m++) pool.push(m);
  // kocok
  for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  return pool.slice(0,SOALAN).map(m=>({a:sifir,b:m,jwb:sifir*m}));
}
function mulaKuiz(tier){
  quiz = {
    sifir:sifirPilih, tier:tier,
    soalan:janaSoalan(sifirPilih),
    idx:0, betul:0, jawapan:"", mula:Date.now(), tamat:false,
    baki: tier===2 ? TIER2_MASA : null
  };
  document.getElementById('qFb').textContent="";
  buatPad(document.getElementById('padQuiz'),
    d=>{ if(!quiz.tamat && quiz.jawapan.length<3){ quiz.jawapan+=d; paparJwb(); } },
    ()=>{ if(!quiz.tamat){ quiz.jawapan=quiz.jawapan.slice(0,-1); paparJwb(); } },
    ()=>{ if(!quiz.tamat) semakJwb(); },
    "Jawab"
  );
  paparSoalan();
  // timer
  clearInterval(timerInt);
  const tEl = document.getElementById('qTimer');
  if(tier===2){
    tEl.textContent = formatMasa(quiz.baki);
    tEl.classList.remove('danger');
    timerInt = setInterval(()=>{
      quiz.baki--;
      tEl.textContent = formatMasa(quiz.baki);
      if(quiz.baki<=30) tEl.classList.add('danger');
      if(quiz.baki<=0){ clearInterval(timerInt); masaTamat(); }
    },1000);
  } else {
    tEl.textContent = "∞";
    tEl.classList.remove('danger');
  }
  show('scr-quiz');
}
function formatMasa(s){ const m=Math.floor(s/60), d=s%60; return m+":"+String(d).padStart(2,"0"); }
function paparSoalan(){
  const q = quiz.soalan[quiz.idx];
  document.getElementById('qText').textContent = `${q.a} × ${q.b} =`;
  document.getElementById('qProg').textContent = `Soalan ${quiz.idx+1}/${SOALAN}`;
  document.getElementById('qBar').style.width = (quiz.idx/SOALAN*100)+"%";
  quiz.jawapan=""; paparJwb();
  document.getElementById('qFb').textContent=""; document.getElementById('qFb').className="fb";
}
function paparJwb(){
  document.getElementById('qAns').innerHTML = quiz.jawapan || "&nbsp;";
}
function semakJwb(){
  if(quiz.jawapan==="") return;
  const q = quiz.soalan[quiz.idx];
  const card = document.getElementById('qCard');
  const fb = document.getElementById('qFb');
  const betul = Number(quiz.jawapan)===q.jwb;
  if(betul){
    quiz.betul++;
    card.classList.remove('badq'); void card.offsetWidth; card.classList.add('good');
    fb.textContent="Betul! ✅"; fb.className="fb good";
  } else {
    card.classList.remove('good'); void card.offsetWidth; card.classList.add('badq');
    fb.textContent=`Salah ❌ Jawapan: ${q.jwb}`; fb.className="fb bad";
  }
  quiz.tamat = true; // kunci input seketika
  setTimeout(()=>{
    quiz.idx++;
    if(quiz.idx>=SOALAN){ habisKuiz(false); }
    else { quiz.tamat=false; paparSoalan(); }
  }, betul?650:1400);
}
function masaTamat(){
  quiz.tamat = true;
  habisKuiz(true);
}
function habisKuiz(sebabMasa){
  clearInterval(timerInt);
  const masaAmbil = Math.round((Date.now()-quiz.mula)/1000);
  const lulus = quiz.betul===SOALAN && !sebabMasa;
  // hantar ke server
  api({action:"submit", id:murid.id, sifir:quiz.sifir, tier:quiz.tier,
       markah:quiz.betul, masa:masaAmbil})
    .then(res=>{
      if(res.ok && typeof res.rank==="number") murid.ranks[quiz.sifir-1]=res.rank;
      paparResult(lulus, sebabMasa, res.ok && res.naik);
    })
    .catch(()=>paparResult(lulus, sebabMasa, false));
  document.getElementById('loadMsg').textContent="Menyimpan keputusan...";
  show('scr-loading');
}

/* ---------- RESULT ---------- */
function paparResult(lulus, sebabMasa, naik){
  const em = document.getElementById('resEmoji');
  const badge = document.getElementById('resBadge');
  const title = document.getElementById('resTitle');
  const msg = document.getElementById('resMsg');
  const retry = document.getElementById('resRetry');
  badge.innerHTML="";
  if(lulus){
    const r = RANK[quiz.tier];
    em.textContent = "🎉";
    badge.innerHTML = `<div class="rank-badge ${r.cls}">${r.ikon}</div>
                       <div class="rank-title ${r.cls}">${r.nama}</div>`;
    title.textContent = naik ? "Tahniah! Rank Naik!" : "Hebat! 10/10!";
    msg.textContent = `Sifir ${quiz.sifir} — anda jawab semua dengan betul!`;
    retry.style.display="none";
    confetti();
  } else {
    em.textContent = sebabMasa ? "⏰" : "💪";
    title.textContent = sebabMasa ? "Masa Tamat!" : "Hampir Sahaja!";
    msg.textContent = sebabMasa
      ? `Anda sempat jawab ${quiz.betul} soalan betul. Cuba lagi, lebih pantas!`
      : `Anda dapat ${quiz.betul}/${SOALAN}. Perlu 10/10 untuk lulus. Jangan putus asa!`;
    retry.style.display="block";
  }
  show('scr-result');
}
function afterResult(){ paparDash(); }
function retryQuiz(){ mulaKuiz(quiz.tier); }

/* ---------- CONFETTI ---------- */
function confetti(){
  const c = document.getElementById('confetti');
  const warna = ["#6C4DF4","#F5B301","#38D6E8","#22C55E","#FF6B9D"];
  c.innerHTML="";
  for(let i=0;i<70;i++){
    const p = document.createElement('i');
    p.style.left = Math.random()*100+"vw";
    p.style.background = warna[Math.floor(Math.random()*warna.length)];
    p.style.animationDuration = (2+Math.random()*2)+"s";
    p.style.animationDelay = (Math.random()*0.8)+"s";
    p.style.transform = `rotate(${Math.random()*360}deg)`;
    c.appendChild(p);
  }
  setTimeout(()=>c.innerHTML="", 4500);
}
</script>
