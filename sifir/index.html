<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaguh Sifir — Cikgu Hilmi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#F3F0FF;--ink:#2B2358;--muted:#7A72A8;--primary:#6C4DF4;--primary-dark:#5438D6;--line:#E4DFFA}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;color:var(--ink);background:var(--bg);
  background-image:radial-gradient(circle at 15% 15%,#E6DEFF 0,transparent 32%),
                   radial-gradient(circle at 85% 85%,#DFF6FF 0,transparent 32%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{max-width:400px;width:100%;text-align:center}
h1{font-family:'Baloo 2',cursive;font-size:2.6rem;color:var(--primary);margin-bottom:6px}
.tag{color:var(--muted);font-weight:700;margin-bottom:30px;font-size:1.05rem}
.btn{display:block;font-family:'Baloo 2',cursive;font-size:1.2rem;font-weight:700;padding:18px;
  border-radius:18px;border:0;cursor:pointer;text-decoration:none;
  background:var(--primary);color:#fff;box-shadow:0 6px 0 var(--primary-dark);
  transition:transform .05s;margin-bottom:16px}
.btn:active{transform:translateY(3px);box-shadow:0 3px 0 var(--primary-dark)}
.btn.ghost{background:#fff;color:var(--primary);box-shadow:0 6px 0 var(--line);border:2px solid var(--line)}
.btn small{display:block;font-family:'Nunito';font-weight:700;font-size:.8rem;opacity:.85;margin-top:3px}
.foot{margin-top:24px;color:var(--muted);font-weight:700;font-size:.82rem}
</style>
</head>
<body>
<div class="box">
  <h1>🏆 Jaguh Sifir</h1>
  <p class="tag">Program hafalan sifir</p>

  <a class="btn" href="kuiz/">Mula Kuiz 🚀<small>Untuk murid yang sudah daftar</small></a>
  <a class="btn ghost" href="daftar/">Daftar Murid Baru 📝<small>Untuk ibu bapa</small></a>

  <p class="foot">Cikgu? <a href="guru/" style="color:var(--primary);font-weight:800">Log masuk dashboard</a></p>
</div>
</body>
</html>
